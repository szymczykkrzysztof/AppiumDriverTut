trigger:
  branches:
    include:
      - master
      - develop

pool:
  name: 'WinAppDriverPool'

variables:
  buildConfiguration: 'Release'
  solutionPath: '**/*.slnx'
  testResultsDir: '$(Build.ArtifactStagingDirectory)\TestResults'

steps:

# ─── 1. Restore NuGet ───────────────────────────────
- task: NuGetToolInstaller@1
  displayName: 'Install NuGet'

- task: NuGetCommand@2
  displayName: 'NuGet Restore'
  inputs:
    restoreSolution: '$(solutionPath)'

# ─── 2. Build ───────────────────────────────────────
- task: VSBuild@1
  displayName: 'Build Solution'
  inputs:
    solution: '$(solutionPath)'
    configuration: '$(buildConfiguration)'
    clean: true

# ─── 3. Uruchom testy ───────────────────────────────
- task: VSTest@2
  displayName: 'Run tests'
  inputs:
    testSelector: 'testAssemblies'
    testAssemblyVer2: |
      **\*Tests*.dll
      **\*Test*.dll
      !**\obj\**
    configuration: '$(buildConfiguration)'
    runInParallel: false
    codeCoverageEnabled: false
    testRunTitle: 'WinAppDriver UI Tests'
    resultsFolder: '$(testResultsDir)'

# ─── 4. Publikuj wyniki ─────────────────────────────
- task: PublishTestResults@2
  displayName: 'Publish tests result'
  condition: always()
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: '$(testResultsDir)\**\*.trx'
    testRunTitle: 'WinAppDriver UI Tests'
    mergeTestResults: true

# ─── 5. Publikuj artefakty ──────────────────────────
- task: PublishBuildArtifacts@1
  displayName: 'Publish artefacts'
  condition: always()
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'TestArtifacts'