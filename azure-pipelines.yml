trigger:
  branches:
    include:
      - master
      - develop

pool:
  name: 'WinAppDriverPool'

variables:
  buildConfiguration: 'Release'
  solutionPath: '**/*.slnx'
  testResultsDir: '$(Build.ArtifactStagingDirectory)\TestResults'

steps:

# ─── 1. Zainstaluj Node.js i Appium ─────────────────
- task: NodeTool@0
  displayName: 'Zainstaluj Node.js'
  inputs:
    versionSpec: '20.x'

- powershell: |
    npm install -g appium
    appium driver install windows
  displayName: 'Zainstaluj Appium globalnie'

# ─── 2. Restore NuGet ───────────────────────────────
- task: NuGetToolInstaller@1
  displayName: 'Zainstaluj NuGet'

- task: NuGetCommand@2
  displayName: 'NuGet Restore'
  inputs:
    restoreSolution: '$(solutionPath)'

# ─── 3. Build ───────────────────────────────────────
- task: VSBuild@1
  displayName: 'Build Solution'
  inputs:
    solution: '$(solutionPath)'
    configuration: '$(buildConfiguration)'
    clean: true

# ─── 4. Uruchom testy ───────────────────────────────
# WinAppDriver i Appium startują z kodu C# [OneTimeSetUp]
- task: VSTest@2
  displayName: 'Uruchom testy'
  inputs:
    testSelector: 'testAssemblies'
    testAssemblyVer2: |
      **\*Tests*.dll
      **\*Test*.dll
      !**\obj\**
    configuration: '$(buildConfiguration)'
    runInParallel: false
    codeCoverageEnabled: false
    testRunTitle: 'WinAppDriver UI Tests'
    resultsFolder: '$(testResultsDir)'

# ─── 5. Publikuj wyniki ─────────────────────────────
- task: PublishTestResults@2
  displayName: 'Publikuj wyniki testów'
  condition: always()
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: '$(testResultsDir)\**\*.trx'
    testRunTitle: 'WinAppDriver UI Tests'
    mergeTestResults: true

# ─── 6. Publikuj artefakty ──────────────────────────
- task: PublishBuildArtifacts@1
  displayName: 'Publikuj artefakty'
  condition: always()
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'TestArtifacts'